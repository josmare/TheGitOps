apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: me-me-app
  name: me-me-app
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: me-me-app
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: me-me-app
    spec:
      containers:
        - name: me-me-app
          image: josmar/personal-page:latest
          imagePullPolicy: Always
          resources: {}
          ports:
            - containerPort: 80
              name: portfolio-svc
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
