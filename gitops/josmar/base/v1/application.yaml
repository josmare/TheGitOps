apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: me-me-app
  name: me-me-app
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: me-me-app
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: me-me-app
    spec:
      containers:
        - name: me-me-app
          image: registry.gitlab.com/josmarr/josmare-personal-page:placeholder
          imagePullPolicy: Always
          resources: {}
          ports:
            # nginx-unprivileged in the new image listens on 8080
            # (the Service already targets 8080).
            - containerPort: 8080
              name: web
      imagePullSecrets:
        - name: josmar-ips
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
