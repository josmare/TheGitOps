---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
  name: josmar-ips
  namespace: flux-salsa-latina
spec:
  encryptedData:
    .dockerconfigjson: 
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
      name: josmar-ips
    type: kubernetes.io/dockerconfigjson

---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: salsa-latina-ir
  namespace: flux-salsa-latina
spec:
  image: registry.gitlab.com/josmarr/salsa-latina
  interval: 5m0s
  secretRef:
    name: josmar-ips
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: salsa-latina-image-updates
  namespace: flux-salsa-latina
spec:
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: flux@montel.fi
        name: flux
      messageTemplate: |-
        flux: automated image update

        Automation name: {{ .AutomationObject }}

        Files:
        {{ range $filename, $_ := .Updated.Files -}}
        - {{ $filename }}
        {{ end -}}

        Objects:
        {{ range $resource, $_ := .Updated.Objects -}}
        - {{ $resource.Kind }} {{ $resource.Name }}
        {{ end -}}

        Images:
        {{ range .Updated.Images -}}
        - {{.}}
        {{ end -}}
  interval: 5m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
#  update:
#    path: ./gitops/salsa-latina
#    strategy: Setters
